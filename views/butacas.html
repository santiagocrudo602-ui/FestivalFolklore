<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Festival Folklore - Seleccionar Butacas</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../public/css/styles.css">
    <style>
        .butacas-container {
            background-color: #111111;
            border: 1px solid #222;
            border-radius: 8px;
            padding: 40px;
            max-width: 500px;
            margin: 0 auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .butaca {
            width: 32px;
            height: 32px;
            background-color: #888;
            margin: 5px;
            border-radius: 4px;
            cursor: pointer;
            display: inline-block;
            transition: background-color 0.2s, transform 0.1s;
        }
        .butaca.selected {
            background-color: #ff80df; /* Color rosado como en el mockup */
        }
        .butaca:hover {
            background-color: #aaa;
            transform: scale(1.1);
        }
        .butaca.selected:hover {
            background-color: #ff99e6;
        }
        .butacas-grid {
            display: flex;
            flex-wrap: wrap;
            width: 340px; /* 8 columnas de (32+10 margin) = 336px aprox */
            margin: 0 auto;
            justify-content: center;
        }
        .info-bar {
            border-top: 1px solid #333;
            border-bottom: 1px solid #333;
            padding: 15px 0;
            margin-top: 30px;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            justify-content: flex-start;
        }
        .badge-cantidad {
            background-color: #1a4f6d;
            color: white;
            padding: 4px 10px;
            border-radius: 4px;
            border: 1px solid #2b99ff;
            margin-left: 10px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="../index.html">Festival Folkore</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="../index.html">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="../views/noches.html">Noches</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#" data-bs-toggle="modal" data-bs-target="#modalCompra">Entradas</a>
                    </li>
                </ul>
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="../views/registro.html">Registrar</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-5 mb-5">
        <div class="butacas-container text-center">
            <h4 class="fw-bold mb-2">Butacas disponibles</h4>
            <p class="text-secondary mb-4" id="butacas-subtitle" style="font-size: 0.9rem;">Seleccione las butacas que desee</p>
            
            <div class="butacas-grid" id="butacasGrid">
                <!-- Se generan 48 butacas (6 filas x 8 columnas) -->
                <script>
                    for(let i=0; i<48; i++) {
                        document.write(`<div class="butaca" onclick="toggleButaca(this)"></div>`);
                    }
                </script>
            </div>
            
            <div class="info-bar">
                <span class="text-secondary fw-bold" style="font-size: 0.9rem;">Butacas seleccionadas</span>
                <span class="badge-cantidad" id="cantidadDisplay">0 / 0</span>
            </div>
            
            <button class="btn btn-primary fw-bold px-4 py-2" style="background-color: #2b99ff; border: none;" onclick="finalizarCompra()">Finalizar compra</button>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/sql-wasm.js"></script>
    <script src="../public/js/db_browser.js?v=2"></script>
    <script src="../public/js/main.js?v=2"></script>
    <script>
        let maxCantidad = 1;

        document.addEventListener('DOMContentLoaded', () => {
            const config = JSON.parse(localStorage.getItem('configCompra'));
            if (config && config.cantidad) {
                maxCantidad = config.cantidad;
                document.getElementById('butacas-subtitle').textContent = `Seleccione un máximo de ${maxCantidad} butaca(s)`;
                document.getElementById('cantidadDisplay').textContent = `0 / ${maxCantidad}`;
            }
        });

        function toggleButaca(element) {
            const seleccionadas = document.querySelectorAll('.butaca.selected').length;
            
            if (!element.classList.contains('selected')) {
                // Intentando seleccionar una nueva
                if (seleccionadas >= maxCantidad) {
                    alert(`Solo puedes seleccionar hasta ${maxCantidad} butacas, que es la cantidad que indicaste previamente.`);
                    return;
                }
                element.classList.add('selected');
            } else {
                // Deseleccionando
                element.classList.remove('selected');
            }
            actualizarCantidad();
        }

        function actualizarCantidad() {
            const seleccionadas = document.querySelectorAll('.butaca.selected').length;
            document.getElementById('cantidadDisplay').textContent = `${seleccionadas} / ${maxCantidad}`;
        }
    </script>
</body>
</html>
