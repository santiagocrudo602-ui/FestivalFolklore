<!DOCTYPE html>
<html lang="es">
<head>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Festival Folklore - Iniciar Sesión</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../public/css/styles.css">
</head>
<body>
    <!-- Navbar (Minimalista para login) -->
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="#">Festival Folkore</a>
        </div>
    </nav>

    <div class="container mt-5" style="max-width: 500px;">
        <div class="card-custom p-5">
            <h3 class="fw-bold mb-4 text-center">Iniciar Sesión</h3>
            <form id="loginForm">
                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-control-custom" id="login_email" name="email" required>
                </div>
                <div class="mb-4">
                    <label class="form-label">Contraseña</label>
                    <input type="password" class="form-control-custom" id="login_password" name="contrasena" required>
                </div>
                
                <button type="submit" class="btn btn-primary w-100 py-2 fw-bold" style="background-color: #2b99ff; border: none;">Ingresar</button>
            </form>

            <form id="verifyForm" style="display: none;">
                <div class="mb-3">
                    <label class="form-label text-center d-block">Código de Verificación (Simulado)</label>
                    <p class="text-secondary text-center small mb-2">Ingresa cualquier código de 6 dígitos para probar el prototipo.</p>
                    <input type="text" class="form-control-custom text-center fs-4" id="verify_code" maxlength="6" required>
                </div>
                <button type="submit" class="btn btn-success w-100 py-2 fw-bold">Verificar Código</button>
            </form>
            
            <div class="text-center mt-4">
                <p class="text-secondary mb-1">¿No tienes cuenta?</p>
                <a href="../views/registro.html" class="text-info text-decoration-none fw-bold">Registrarse aquí</a>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/sql-wasm.js"></script>
    <script src="../public/js/db_browser.js?v=4"></script>
    <script src="../public/js/main.js?v=4"></script>
</body>
</html>
