<!DOCTYPE html>
<html lang="es">
<head>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Festival Folklore - Registro</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../public/css/styles.css">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="../index.html">Festival Folkore</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="../index.html">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="../views/noches.html">Noches</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#" data-bs-toggle="modal" data-bs-target="#modalCompra">Entradas</a>
                    </li>
                </ul>
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link active" href="../views/registro.html">Registrar</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-5" style="max-width: 800px;">
        <form class="row g-4" id="registroForm">
            <div class="col-md-6">
                <label class="form-label">Nombre</label>
                <input type="text" class="form-control-custom" id="nombre" name="nombre" required>
            </div>
            <div class="col-md-6">
                <label class="form-label">Apellido</label>
                <input type="text" class="form-control-custom" id="apellido" name="apellido" required>
            </div>
            
            <div class="col-md-6">
                <label class="form-label">DNI</label>
                <input type="text" class="form-control-custom" id="dni" name="dni" required pattern="\d{8}" maxlength="8" minlength="8" title="Debe contener exactamente 8 números.">
            </div>
            <div class="col-md-6">
                <label class="form-label">Email</label>
                <input type="email" class="form-control-custom" id="email" name="email" required>
            </div>

            <div class="col-md-6">
                <label class="form-label">Dirección</label>
                <input type="text" class="form-control-custom" id="direccion" name="direccion" required>
            </div>
            <div class="col-md-6">
                <label class="form-label">Contraseña</label>
                <input type="password" class="form-control-custom" id="contrasena" name="contrasena" required>
            </div>

            <div class="col-12">
                <div class="form-check">
                    <input class="form-check-input bg-dark border-secondary" type="checkbox" id="gridCheck" required>
                    <label class="form-check-label text-light" for="gridCheck">
                        Check me out
                    </label>
                </div>
            </div>
            
            <div class="col-12 mt-4">
                <button type="submit" class="btn-custom-outline px-4 py-2 fw-bold" style="background-color: #1a4f6d; color: white; border-color: #2b99ff;">Registrar</button>
            </div>
        </form>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/sql-wasm.js"></script>
    <script src="../public/js/db_browser.js?v=4"></script>
    <script src="../public/js/main.js?v=4"></script>
</body>
</html>
