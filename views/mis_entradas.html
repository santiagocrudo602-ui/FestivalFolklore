<!DOCTYPE html>
<html lang="es">
<head>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Festival Folklore - Mis Entradas</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../public/css/styles.css">
</head>
<body>
    <!-- Navbar -->
      <nav class="navbar navbar-expand-lg">
          <div class="container">
              <a class="navbar-brand" href="../index.html">Festival Folkore</a>
              <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
              <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                  <ul class="navbar-nav" id="nav-items">
                      <li class="nav-item"><a class="nav-link" href="../index.html">Inicio</a></li>
                      <li class="nav-item"><a class="nav-link" href="noches.html">Noches</a></li>
                  </ul>
              </div>
        </div>
    </nav>

    <div class="container mt-5">
        <h2 class="fw-bold mb-4">Mis Entradas</h2>
        <div class="card-custom p-4">
            <div class="table-responsive">
                <table class="table table-hover table-dark align-middle">
                    <thead>
                        <tr>
                            <th>Entrada (Código)</th>
                            <th>Nº Factura</th>
                            <th>Noche / Butaca</th>
                            <th>Monto Base</th>
                            <th>Descuento</th>
                            <th>Total Pagado</th>
                            <th>Fecha</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-entradas">
                        <!-- Las entradas se cargarán aquí dinámicamente -->
                    </tbody>
                </table>
            </div>
            <div id="no-entradas" class="alert alert-info d-none mt-3">
                No tienes entradas compradas.
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/sql-wasm.js"></script>
    <script src="../public/js/db_browser.js?v=4"></script>
    <script src="../public/js/main.js?v=4"></script>
    <script>
        document.addEventListener('db_ready', () => {
            const usuarioStr = localStorage.getItem('usuario');
            if (!usuarioStr) {
                alert('Debes iniciar sesión para ver tus entradas.');
                window.location.href = 'login.html';
                return;
            }
            
            const usuario = JSON.parse(usuarioStr);
            const id_cliente = usuario.id_cliente || usuario.id;

            try {
                // Obtener entradas desde SQLite en el navegador
                const result = window.queryDB(`
                    SELECT e.id_entrada, e.fecha_venta, e.codigoBarra, e.numero_factura, e.id_butaca as butaca,
                           p.monto as precio_base, n.numero_noche as noche, d.porcentaje as descuento
                    FROM ENTRADA e
                    LEFT JOIN PRECIO p ON e.id_precio = p.id_precio
                    LEFT JOIN NOCHE n ON p.id_noche = n.id_noche
                    LEFT JOIN DESCUENTO d ON e.id_descuento = d.id_descuento
                    WHERE e.id_cliente = ?
                `, [id_cliente]);
                
                const tbody = document.getElementById('tabla-entradas');
                const noEntradas = document.getElementById('no-entradas');
                
                if (!result || result.length === 0) {
                    noEntradas.classList.remove('d-none');
                } else {
                    result.forEach(entrada => {
                        const tr = document.createElement('tr');
                        const precioBase = parseFloat(entrada.precio_base) || 0;
                        const descPorcentaje = parseFloat(entrada.descuento) || 0;
                        const total = precioBase - (precioBase * (descPorcentaje / 100));

                        tr.innerHTML = `
                            <td><strong class="text-info">${entrada.codigoBarra}</strong></td>
                            <td>${entrada.numero_factura || '-'}</td>
                            <td>Noche ${entrada.noche || '?'} - Butaca ${entrada.butaca}</td>
                            <td>$${precioBase.toFixed(2)}</td>
                            <td>${descPorcentaje > 0 ? descPorcentaje + '%' : '-'}</td>
                            <td><strong class="text-success">$${total.toFixed(2)}</strong></td>
                            <td>${entrada.fecha_venta ? new Date(entrada.fecha_venta).toLocaleDateString('es-ES') : '-'}</td>
                        `;
                        tbody.appendChild(tr);
                    });
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Ocurrió un error al cargar las entradas.');
            }
        });
    </script>
</body>
</html>
