<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Festival Folklore - Noche Detalle</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="/">Festival Folkore</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="/noches">Noches</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#" data-bs-toggle="modal" data-bs-target="#modalCompra">Entradas</a>
                    </li>
                </ul>
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/registro">Registrar</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-5" style="max-width: 800px;">
        <div class="card-custom text-center" style="padding: 50px 20px; min-height: 400px; display: flex; flex-direction: column; justify-content: center;">
            <h1 class="fw-bold mb-3" id="noche-titulo">Noche X</h1>
            <h4 class="text-secondary mb-4" id="noche-fecha">Domingo 12 de Julio</h4>
            
            <div class="mt-4">
                <h5 class="fw-bold">DESCRIPCIÓN</h5>
                <p class="text-light mt-3" id="noche-descripcion">
                    Aquí se listarán los artistas asignados a esta noche.
                </p>
            </div>
        </div>
        
        <div class="text-center mt-4">
            <a href="/noches" class="btn btn-secondary px-4 py-2" style="background-color: #444; border: none;">Volver a Noches</a>
        </div>
    </div>

    <!-- Modal Compra -->
    <div class="modal fade" id="modalCompra" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content custom-modal">
          <div class="modal-header border-0">
            <h5 class="modal-title">Compra tu entrada</h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <div class="row g-3">
                <div class="col-md-3">
                    <label class="form-label">Noche</label>
                    <select id="compra_noche" class="form-select-custom">
                        <option value="1">Noche 1</option>
                        <option value="2">Noche 2</option>
                        <option value="3">Noche 3</option>
                        <option value="4">Noche 4</option>
                        <option value="5">Noche 5</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label">Público</label>
                    <select id="compra_publico" class="form-select-custom">
                        <option value="1">Mayores</option>
                        <option value="2">Menores</option>
                        <option value="3">Jubilados</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label">Sector</label>
                    <select id="compra_sector" class="form-select-custom">
                        <option value="1">Sector A (VIP)</option>
                        <option value="2">Sector B (Platea)</option>
                        <option value="3">Sector C (Popular)</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label">Cantidad</label>
                    <div class="d-flex align-items-center mt-1">
                        <button type="button" class="btn btn-dark border border-secondary px-3" style="background-color: #111;" onclick="modificarCantidad(-1)">-</button>
                        <input type="text" id="compra_cantidad" class="form-control-custom text-center mx-1 mb-0 px-1 py-1" value="1" style="width: 40px; height: 35px;" readonly>
                        <button type="button" class="btn btn-dark border border-secondary px-3" style="background-color: #111;" onclick="modificarCantidad(1)">+</button>
                    </div>
                </div>
            <div class="text-center mt-3">
                <button type="button" onclick="agregarAlCarrito()" class="btn btn-warning fw-bold px-4 py-2 text-dark" style="border: none;">Agregar al Carrito</button>
            </div>
            <div id="carrito_container" class="mt-4 mx-auto" style="display: none; max-width: 95%;">
                <h6 class="text-start text-secondary mb-2">Tickets seleccionados:</h6>
                <table class="table table-dark table-bordered text-center mb-0" style="font-size: 0.9rem;">
                    <thead>
                        <tr>
                            <th scope="col">Detalle</th>
                            <th scope="col">Cant.</th>
                            <th scope="col">Subtotal</th>
                            <th scope="col"></th>
                        </tr>
                    </thead>
                    <tbody id="carrito_body">
                        <!-- Items dinámicos -->
                    </tbody>
                    <tfoot>
                        <tr>
                            <th colspan="2" class="text-end text-light">Total:</th>
                            <th id="carrito_total_display" class="text-success fw-bold fs-5">$0</th>
                            <th></th>
                        </tr>
                    </tfoot>
                </table>
            </div>
            <div class="text-center mt-4">
                <button type="button" onclick="irAButacas()" id="btn_ver_butacas" class="btn btn-info w-50 py-2 text-white fw-bold" style="background-color: #2b99ff; border: none;" disabled>Elegir Butacas (0)</button>
            </div>
          </div>
          <div class="modal-footer border-0 justify-content-end">
            <button type="button" class="btn btn-secondary px-4 py-2" style="background-color: #777; border: none;" data-bs-dismiss="modal">Volver</button>
            <button type="button" class="btn btn-primary px-4 py-2 fw-bold" style="background-color: #2b99ff; border: none;">Comprar</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/main.js"></script>
</body>
</html>
